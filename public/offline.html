<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Offline · Family Food OS</title>
    <meta name="theme-color" content="#4E7A5E" />
    <style>
      :root {
        --bg: hsl(40 20% 98%);
        --fg: hsl(30 10% 12%);
        --muted: hsl(30 8% 46%);
        --primary: hsl(152 28% 38%);
        --primary-fg: hsl(40 20% 98%);
        --card: hsl(40 25% 97%);
        --border: hsl(35 18% 88%);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: hsl(30 10% 8%);
          --fg: hsl(40 15% 92%);
          --muted: hsl(35 12% 60%);
          --primary: hsl(152 30% 50%);
          --primary-fg: hsl(30 10% 8%);
          --card: hsl(30 10% 11%);
          --border: hsl(30 12% 20%);
        }
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--fg);
        font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: env(safe-area-inset-top) 1.5rem env(safe-area-inset-bottom);
      }
      .card {
        width: 100%;
        max-width: 440px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 1.25rem;
        padding: 2rem 1.75rem;
        box-shadow: 0 8px 40px hsla(0,0%,0%,0.06);
        text-align: center;
      }
      .icon {
        width: 64px;
        height: 64px;
        border-radius: 1rem;
        background: var(--primary);
        color: var(--primary-fg);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.25rem;
        font-size: 28px;
      }
      h1 {
        font-family: 'Fraunces', Georgia, serif;
        font-size: 1.6rem;
        line-height: 1.2;
        margin: 0 0 0.5rem;
        font-weight: 600;
      }
      p {
        color: var(--muted);
        font-size: 0.95rem;
        line-height: 1.5;
        margin: 0 0 1.5rem;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        background: var(--primary);
        color: var(--primary-fg);
        border: 0;
        border-radius: 0.75rem;
        padding: 0.75rem 1.25rem;
        font-size: 0.95rem;
        font-weight: 500;
        cursor: pointer;
        text-decoration: none;
        font-family: inherit;
      }
      .btn:hover { opacity: 0.92; }
      .hint {
        margin-top: 1rem;
        font-size: 0.8rem;
        color: var(--muted);
      }
      .status {
        display: inline-block;
        margin-top: 0.75rem;
        padding: 0.25rem 0.625rem;
        border-radius: 999px;
        font-size: 0.75rem;
        background: hsla(0, 0%, 50%, 0.12);
        color: var(--muted);
      }
      .status.online {
        background: hsla(152, 40%, 50%, 0.15);
        color: var(--primary);
      }
    </style>
  </head>
  <body>
    <main class="card" role="main">
      <div class="icon" aria-hidden="true">🍽️</div>
      <h1>You're offline</h1>
      <p>
        We can't reach the kitchen right now. Your saved plan will be here
        as soon as you're back online.
      </p>
      <button class="btn" id="retry" type="button">Try again</button>
      <div class="hint">
        <span class="status" id="status">Checking connection…</span>
      </div>
    </main>
    <script>
      const statusEl = document.getElementById('status');
      const retryBtn = document.getElementById('retry');

      function updateStatus() {
        if (navigator.onLine) {
          statusEl.textContent = 'Back online';
          statusEl.classList.add('online');
        } else {
          statusEl.textContent = 'Still offline';
          statusEl.classList.remove('online');
        }
      }

      retryBtn.addEventListener('click', () => {
        window.location.reload();
      });

      window.addEventListener('online', () => {
        updateStatus();
        // Auto-retry shortly after reconnect
        setTimeout(() => window.location.reload(), 600);
      });
      window.addEventListener('offline', updateStatus);
      updateStatus();
    </script>
  </body>
</html>
